
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal AI Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #131314; 
            color: #e3e3e3; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; height: 100vh;
        }
        header {
            padding: 20px; text-align: center; border-bottom: 1px solid #2d2f31;
            background-color: #1e1f20;
        }
        header h1 { font-size: 1.5rem; color: #fff; font-weight: 500; }
        #chatContainer {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
        }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; }
        .user { background-color: #2b2a33; align-self: flex-end; color: #fff; }
        .ai { background-color: #1e1f20; align-self: flex-start; border: 1px solid #2d2f31; }
        #inputContainer {
            padding: 20px; display: flex; gap: 10px; background-color: #131314;
            border-top: 1px solid #2d2f31;
        }
        input {
            flex: 1; padding: 14px; border-radius: 24px; border: 1px solid #4d4d4d;
            background-color: #1e1f20; color: #fff; font-size: 1rem; outline: none;
        }
        input:focus { border-color: #a8c7fa; }
        button {
            padding: 0 24px; border-radius: 24px; border: none;
            background-color: #a8c7fa; color: #041e49; font-weight: bold;
            font-size: 1rem; cursor: pointer; transition: background 0.2s;
        }
        button:hover { background-color: #c2e7ff; }
        button:disabled { background-color: #4d4d4d; color: #808080; cursor: not-allowed; }
    </style>
</head>
<body>

    <header>
        <h1>Claude AI Chat (Via Agent Router)</h1>
    </header>

    <div id="chatContainer">
        <div class="message ai">Hello Ayan! Main aapki coding ya projects me kaise madad kar sakta hoon?</div>
    </div>

    <div id="inputContainer">
        <input type="text" id="userInput" placeholder="Ask something..." onkeypress="handleKeyPress(event)">
        <button id="sendBtn" onclick="askAI()">Send</button>
    </div>

    <script>
        // Aapka exact Hugging Face backend URL endpoint
        const BACKEND_URL = "https://lwyeiaons-0h.hf.space/api/chat";

        function handleKeyPress(e) {
            if (e.key === 'Enter') askAI();
        }

        async function askAI() {
            const inputEl = document.getElementById('userInput');
            const chatContainer = document.getElementById('chatContainer');
            const sendBtn = document.getElementById('sendBtn');
            const prompt = inputEl.value.trim();

            if (!prompt) return;

            // User ka message display karein
            appendMessage(prompt, 'user');
            inputEl.value = '';
            
            // Loading state start
            sendBtn.disabled = true;
            const loadingDiv = appendMessage('Thinking...', 'ai');

            try {
                const response = await fetch(BACKEND_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: prompt })
                });

                const data = await response.json();
                
                // Agent Router / OpenAI Format parsing
                if (data.choices && data.choices[0] && data.choices[0].message) {
                    loadingDiv.innerText = data.choices[0].message.content;
                } else if (data.content && data.content[0]) {
                    // Anthropic Format parsing
                    loadingDiv.innerText = data.content[0].text;
                } else {
                    loadingDiv.innerText = "Sahi response format nahi mila. Check backend logs.";
                    console.log("Raw Response:", data);
                }

            } catch (error) {
                console.error("Frontend Error:", error);
                loadingDiv.innerText = "Error: Server se response nahi mila.";
            } finally {
                sendBtn.disabled = false;
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        function appendMessage(text, sender) {
            const chatContainer = document.getElementById('chatContainer');
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            msgDiv.innerText = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msgDiv;
        }
    </script>
</body>
</html>
